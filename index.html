<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation — Hero</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <h1 class="hero__title">
  <span class="hero__title-line hero__title-line--">WED</span>
  <span class="hero__title-line hero__title-line--DING">ding</span>
  <span class="hero__title-line hero__title-line--WED">wed</span>
  <span class="hero__title-line hero__title-line--DING">ding</span>
</h1>

    <figure class="hero__photo">
      <!-- Сюда вставить фото жениха и невесты -->
      <!-- <img class="hero__photo-img" src="path/to/photo.jpg" alt="Жених и невеста"> -->
    </figure>
    
  </section>
 <section class="greeting">
    <div class="greeting__content">
      <h2 class="greeting__title">Дорогие гости родные и близкие !</h2>
      <p class="greeting__text">Совсем скоро наступит день, который станет для нас особенным</p>
    </div>
  </section>
  
  <section class="date-block">
  <table class="date">
    <thead>
      <tr>
        <th class="date__weekday">Пятница</th>
        <th class="date__weekday">Суббота</th>
        <th class="date__weekday">Воскресенье</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="date__month">Июнь</td>
        <td class="date__month date__month--accent">Июнь</td>
        <td class="date__month">Июнь</td>
      </tr>
      <tr>
        <td class="date__number">26</td>
        <td class="date__number date__number--accent">27</td>
        <td class="date__number">28</td>
      </tr>
    </tbody>
  </table>
</section>

  <section class="invitation">
    <p class="invitation__text">С огромной радостью приглашаем вас разделить с нами этот важный момент нашей жизни</p>
  </section>
  
</body>
</html>
